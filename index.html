<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 수요조사 설문</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"></script>
<style>
  @property --bg1{syntax:'<color>';inherits:true;initial-value:#171a3d;}
  @property --bg2{syntax:'<color>';inherits:true;initial-value:#454a95;}
  @property --fg{syntax:'<color>';inherits:true;initial-value:#f4f2ff;}
  @property --accent{syntax:'<color>';inherits:true;initial-value:#9a9ef0;}
  @property --card{syntax:'<color>';inherits:true;initial-value:rgba(255,255,255,.06);}

  :root{
    --dur:900ms;
    --ease:cubic-bezier(.65,0,.35,1);
    --font-body:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    --font-display:'Gowun Batang', serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    color:var(--fg);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    transition:--bg1 var(--dur) var(--ease), --bg2 var(--dur) var(--ease),
               --fg var(--dur) var(--ease), --accent var(--dur) var(--ease),
               color var(--dur) var(--ease);
    overflow-x:hidden;
  }

  .wrap{width:100%;max-width:560px;}

  .arc-box{position:relative;height:96px;margin-bottom:8px;}
  .arc-box svg{width:100%;height:100%;overflow:visible;}
  .arc-path{fill:none;stroke:var(--fg);stroke-opacity:.18;stroke-width:2;}
  .arc-sun{fill:var(--accent);}
  .arc-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:.03em;opacity:.55;padding:0 2px;}
  .scene-name{text-align:center;font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;opacity:.7;margin:2px 0 20px;}

  .card{
    background:var(--card);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.16);
    border-radius:22px;
    padding:36px 30px 28px;
    transition:--card var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }

  h1{font-family:var(--font-display);font-weight:700;font-size:24px;line-height:1.4;margin:0 0 10px;}
  p.lead{font-size:14.5px;line-height:1.7;opacity:.85;margin:0 0 10px;}

  .q{margin-bottom:26px;}
  .q:last-child{margin-bottom:0;}
  .q-title{font-size:15.5px;font-weight:600;margin-bottom:12px;line-height:1.5;}
  .q-sub{font-size:12.5px;opacity:.65;margin:-8px 0 12px;font-weight:400;}

  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    display:flex;align-items:center;gap:10px;
    padding:11px 14px;border-radius:12px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);
    cursor:pointer;font-size:14px;
    transition:border-color .2s,background .2s;
  }
  .opt:hover{border-color:var(--accent);}
  .opt input{accent-color:var(--accent);width:16px;height:16px;flex-shrink:0;}
  .opt.checked{border-color:var(--accent);background:rgba(255,255,255,.18);font-weight:600;}

  .scale{display:flex;gap:6px;justify-content:space-between;}
  .scale label{flex:1;text-align:center;}
  .scale input{display:none;}
  .scale .dot{
    display:block;width:100%;padding:10px 0 6px;border-radius:12px;
    border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
    cursor:pointer;font-size:12px;transition:border-color .2s,background .2s;
  }
  .scale input:checked + .dot{border-color:var(--accent);background:rgba(255,255,255,.2);font-weight:700;}

  select,textarea,input[type=email],input[type=text]{
    width:100%;padding:12px 14px;border-radius:12px;
    border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.1);
    color:inherit;font-family:var(--font-body);font-size:14px;outline:none;
  }
  select:focus,textarea:focus,input:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:80px;}

  .faq-item{
    border:1px solid rgba(255,255,255,.22);border-radius:12px;
    padding:2px 14px;margin-bottom:8px;background:rgba(255,255,255,.06);
  }
  .faq-item summary{
    cursor:pointer;list-style:none;font-size:13.5px;font-weight:600;
    padding:11px 0;display:flex;align-items:center;gap:8px;
  }
  .faq-item summary::-webkit-details-marker{display:none;}
  .faq-item summary::before{content:'+';color:var(--accent);font-weight:700;font-size:16px;width:14px;flex-shrink:0;}
  .faq-item[open] summary::before{content:'−';}
  .faq-item .faq-a{font-size:13px;line-height:1.65;opacity:.85;padding:0 0 14px 22px;}

  .consent{display:flex;align-items:flex-start;gap:10px;font-size:13px;opacity:.85;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.18);}
  .consent input{margin-top:3px;accent-color:var(--accent);}

  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px;}
  button{
    font-family:var(--font-body);font-weight:600;font-size:14px;
    padding:12px 22px;border-radius:12px;border:none;cursor:pointer;
    transition:transform .15s, opacity .15s;
  }
  button:active{transform:scale(.96);}
  .btn-primary{background:var(--accent);color:#fff;margin-left:auto;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--fg);opacity:.7;padding:12px 8px;}
  .btn-ghost:hover{opacity:1;}

  .dots{display:flex;gap:6px;justify-content:center;}
  .dots span{width:6px;height:6px;border-radius:50%;background:var(--fg);opacity:.25;transition:opacity .3s,transform .3s;}
  .dots span.active{opacity:1;transform:scale(1.4);}

  .footer-note{text-align:center;font-size:11.5px;opacity:.55;margin-top:16px;}
  .hidden{display:none !important;}
  .done-icon{font-family:var(--font-display);font-size:44px;text-align:center;margin-bottom:6px;}
  ::selection{background:var(--accent);color:#fff;}

  @media (max-width:420px){
    .card{padding:28px 20px 22px;}
    h1{font-size:21px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.01ms !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="arc-box">
    <svg viewBox="0 0 400 90" preserveAspectRatio="none">
      <path class="arc-path" d="M 20 85 Q 200 -10 380 85"/>
      <circle class="arc-sun" id="arcSun" r="7" cx="20" cy="85"/>
    </svg>
  </div>
  <div class="arc-labels" id="arcLabels"></div>
  <div class="scene-name" id="sceneName"></div>

  <form class="card" id="surveyForm">
    <div id="screensRoot"></div>
    <div class="nav" id="navRow">
      <button type="button" class="btn-ghost" id="prevBtn">← 이전</button>
      <div class="dots" id="dots"></div>
      <button type="button" class="btn-primary" id="nextBtn">다음 →</button>
    </div>
  </form>
  <p class="footer-note" id="footerNote">1 / 5</p>
</div>

<script>
/* =========================================================================
   ⚙️  여기서부터 설정 (CONFIG) — 색상과 설문 문항을 전부 여기서 바꾸면 됩니다.
   아래쪽 렌더링 코드는 건드릴 필요 없어요.
   ========================================================================= */
const CONFIG = {

  // 제품 가격 — 여기 숫자만 바꾸면 섹션4 문구에 자동 반영됩니다.
  price: '00,000원',

  // 전체 진행 단계 수 (분기가 있어도 실제로 지나는 화면 수는 항상 5단계:
  // 학번/이름 → NFC기능 → 조명기능 → 구매의향 → 마음에든점/아쉬운점)
  totalSteps: 5,

  // ---- 1) 시간대(장면)별 배경색 -------------------------------------------
  scenes: [
    { name:'새벽', time:'06:00', bg1:'#171a3d', bg2:'#454a95', fg:'#f4f2ff', accent:'#9a9ef0', card:'rgba(255,255,255,0.06)' },
    { name:'아침', time:'09:00', bg1:'#fff2cf', bg2:'#ffcf6e', fg:'#3a2c10', accent:'#e08e1d', card:'rgba(255,255,255,0.45)' },
    { name:'한낮', time:'13:00', bg1:'#eaf7ff', bg2:'#a9d9ff', fg:'#132433', accent:'#1f7fc4', card:'rgba(255,255,255,0.55)' },
    { name:'노을', time:'17:00', bg1:'#ffb26b', bg2:'#e8563f', fg:'#3a1109', accent:'#c53a24', card:'rgba(255,255,255,0.35)' },
    { name:'밤',   time:'20:00', bg1:'#141b3d', bg2:'#2c2f63', fg:'#eef0ff', accent:'#d98e4a', card:'rgba(255,255,255,0.08)' },
    { name:'깊은 밤', time:'23:00', bg1:'#05070f', bg2:'#151833', fg:'#e6e6ff', accent:'#8b8fd9', card:'rgba(255,255,255,0.04)' }
  ],

  // ---- 2) 설문 화면(섹션) 구성 --------------------------------------------
  // id : 화면 고유 이름 (분기(next/branch)에서 이 id로 다음 화면을 지정)
  // sceneIndex : scenes 배열에서 몇 번째 색을 쓸지
  // type : 'questions' | 'done'
  // next : 다음 화면 id를 고정으로 지정 (분기 없을 때)
  // branch : { field: 문항 name, cases: { 답변값: 다음 화면id } } — 답변에 따라 분기
  //
  // 문항(questions) 타입:
  //  - text     : 한 줄 텍스트   - radio : 하나만 선택
  //  - checkbox : 여러 개 선택(중복 가능)  - faq : 클릭하면 펼쳐지는 Q&A 목록(응답 아님, 정보 제공용)
  sections: [
    {
      id:'s1', sceneIndex:0, type:'questions',
      title:'설문을 시작하기 전에',
      questions:[
        { type:'text', name:'student_id', title:'1. 학번', required:true, placeholder:'예: 30215' },
        { type:'text', name:'student_name', title:'2. 이름', required:true, placeholder:'이름을 입력해주세요' }
      ]
    },
    {
      id:'s2', sceneIndex:1, type:'questions',
      title:'첫 번째 기능: 스마트폰 잠금',
      body:['첫 번째 기능으론 공부에 방해되는 스마트폰을 금지하는 기능입니다. NFC에 스마트폰을 갖다 대면 스마트폰이 잠기고 얼마나 잠겼는지 타이머로 표시해줍니다. 궁금한 점이 있으신가요?'],
      questions:[
        { type:'faq', items:[
          { q:'NFC는 무엇인가요?', a:'버스에서 카드 찍는데 등에 쓰이는 NFC(Near Field Communication)는 근거리 무선 통신입니다.' },
          { q:'스마트폰이 잠긴다는게 어떤 의미인가요?', a:'NFC 위에 스마트폰을 올려두고 칸막이를 닫아 스마트폰을 보이지도 않고 사용할 수도 없게 만듭니다. 스마트폰을 다시 사용하고 싶으면 칸막이를 올린 뒤 스마트폰을 가져가면 됩니다.' },
          { q:'위 기기에 쓰이는 타이머가 정확히 어떤 뜻인가요?', a:'스마트폰을 잠근 시점부터 타이머가 시작되어 시간이 어느 정도 흘렀는지 타이머가 계속해서 알려줍니다. 스마트폰을 NFC에서 뗀 순간부터 타이머는 초기화됩니다.' }
        ]}
      ],
      next:'s3'
    },
    {
      id:'s3', sceneIndex:3, type:'questions',
      title:'두 번째 기능: 시간에 따라 바뀌는 조명',
      body:['두 번째 기능으론 시간이 지남에 따라 조명이 비추는 빛을 바꾸어 집중력을 높여줍니다. 지금 이 설문에 오기까지 배경 색이 주기적으로 바뀌었던 것도 이 효과를 간접 체험시키기 위해서였습니다.'],
      questions:[
        { type:'faq', items:[
          { q:'각각의 빛은 어떤 효과가 있나요?', a:'(미정)' },
          { q:'빛은 언제, 어떤 색깔로 바뀌나요?', a:'(미정)' }
        ]}
      ],
      next:'s4'
    },
    {
      id:'s4', sceneIndex:4, type:'questions',
      title:'구매 의향을 알려주세요',
      body:['저희 제품의 가격은 {{price}}입니다. 저희 제품을 살 의향이 있으신가요?'],
      questions:[
        { type:'radio', name:'purchase_intent', required:true,
          options:[ {value:'예',label:'예'}, {value:'아니요',label:'아니요'} ] }
      ],
      branch:{ field:'purchase_intent', cases:{ '예':'s5', '아니요':'s6' } }
    },
    {
      id:'s5', sceneIndex:4, type:'questions',
      title:'마음에 들었던 점',
      questions:[
        { type:'checkbox', name:'liked_features', title:'저희 제품의 기능 중 가장 마음에 들었던 요소를 알려주세요. (중복 선택 가능)', required:true,
          options:[ {value:'가격',label:'가격'}, {value:'핸드폰 금지 기능',label:'핸드폰 금지 기능'}, {value:'조명 기능',label:'조명 기능'}, {value:'기타',label:'기타'} ] }
      ],
      next:'s7'
    },
    {
      id:'s6', sceneIndex:4, type:'questions',
      title:'아쉬웠던 점',
      questions:[
        { type:'checkbox', name:'reasons_not_buy', title:'저희 제품을 구매하지 않게 된 계기는 무엇인가요? (중복 선택 가능)', required:true,
          options:[ {value:'가격',label:'가격'}, {value:'핸드폰 금지 기능',label:'핸드폰 금지 기능'}, {value:'조명 기능',label:'조명 기능'}, {value:'기타',label:'기타'} ] }
      ],
      next:'s7'
    },
    {
      id:'s7', type:'done', icon:'🙏',
      title:'설문지에 응해 주셔서 감사합니다!'
    }
  ]
};

// ---- 3) 구글시트로 응답 전송 ----------------------------------------------
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyodbk1i2BZBJCzSLOBj8UmWQD0Bo_vVO_1chKd5SgzXrageU7Eqw9wLQINdWLdWy5G/exec";

/* =========================================================================
   ⚙️  설정 끝. 아래는 위 CONFIG를 화면으로 그려주는 코드입니다.
   ========================================================================= */
(function(){
  const scenes = CONFIG.scenes;
  const sections = CONFIG.sections;
  const byId = {};
  sections.forEach(s=>byId[s.id]=s);
  const firstId = sections[0].id;
  const total = CONFIG.totalSteps || sections.filter(s=>s.type!=='done').length;

  const body = document.body;
  const root = document.getElementById('screensRoot');
  const arcSun = document.getElementById('arcSun');
  const arcLabels = document.getElementById('arcLabels');
  const sceneName = document.getElementById('sceneName');
  const dotsWrap = document.getElementById('dots');
  const footerNote = document.getElementById('footerNote');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const navRow = document.getElementById('navRow');
  const form = document.getElementById('surveyForm');

  let currentId = firstId;
  let history = [firstId];

  scenes.forEach(sc=>{
    const span = document.createElement('span');
    span.textContent = sc.time || '';
    arcLabels.appendChild(span);
  });
  for(let i=0;i<total;i++){
    const d = document.createElement('span');
    if(i===0) d.classList.add('active');
    dotsWrap.appendChild(d);
  }

  function el(tag, cls, html){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(html!==undefined) e.innerHTML = html;
    return e;
  }

  function interpolate(str){
    return str.replace('{{price}}', CONFIG.price);
  }

  function buildQuestion(q){
    if(q.type==='faq'){
      const wrap = el('div','q');
      q.items.forEach(item=>{
        const d = document.createElement('details');
        d.className='faq-item';
        d.innerHTML = `<summary>${item.q}</summary><div class="faq-a">${item.a}</div>`;
        wrap.appendChild(d);
      });
      return wrap;
    }

    const wrap = el('div','q');
    if(q.title) wrap.appendChild(el('div','q-title',q.title));
    if(q.sub) wrap.appendChild(el('div','q-sub',q.sub));

    if(q.type==='radio' || q.type==='checkbox'){
      const inputType = q.type==='checkbox' ? 'checkbox' : 'radio';
      const opts = el('div','options');
      q.options.forEach((o,i)=>{
        const label = el('label','opt');
        label.innerHTML = `<input type="${inputType}" name="${q.name}" value="${o.value}" ${q.required && i===0 ? 'required':''}><span>${o.label}</span>`;
        opts.appendChild(label);
      });
      wrap.appendChild(opts);
    }
    else if(q.type==='scale'){
      const sc = el('div','scale');
      q.points.forEach((p,i)=>{
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="${q.name}" value="${p.value}" ${q.required && i===0 ? 'required':''}><span class="dot">${p.label}</span>`;
        sc.appendChild(label);
      });
      wrap.appendChild(sc);
    }
    else if(q.type==='select'){
      const sel = document.createElement('select');
      sel.name = q.name;
      if(q.required) sel.required = true;
      const def = document.createElement('option');
      def.value=''; def.disabled=true; def.selected=true; def.textContent='선택해주세요';
      sel.appendChild(def);
      q.options.forEach(o=>{
        const op = document.createElement('option');
        op.value=o.value; op.textContent=o.label;
        sel.appendChild(op);
      });
      wrap.appendChild(sel);
    }
    else if(q.type==='textarea'){
      const ta = document.createElement('textarea');
      ta.name=q.name; ta.placeholder=q.placeholder||'';
      if(q.required) ta.required = true;
      wrap.appendChild(ta);
    }
    else if(q.type==='text' || q.type==='email'){
      const inp = document.createElement('input');
      inp.type = q.type; inp.name=q.name; inp.placeholder=q.placeholder||'';
      if(q.required) inp.required = true;
      wrap.appendChild(inp);
    }
    return wrap;
  }

  function buildSection(section){
    const screen = el('section','screen hidden');
    screen.dataset.id = section.id;

    if(section.type==='done'){
      if(section.icon) screen.appendChild(el('div','done-icon',section.icon));
      if(section.title) screen.appendChild(el('h1',null,section.title));
      (section.body||[]).forEach(p=>screen.appendChild(el('p','lead',interpolate(p))));
    } else {
      if(section.title) screen.appendChild(el('h1',null,section.title));
      (section.body||[]).forEach(p=>screen.appendChild(el('p','lead',interpolate(p))));
      (section.questions||[]).forEach(q=>screen.appendChild(buildQuestion(q)));
    }
    return screen;
  }

  const screenEls = {};
  sections.forEach(s=>{
    const node = buildSection(s);
    root.appendChild(node);
    screenEls[s.id] = node;
  });

  function sunPos(t){
    const x0=20,y0=85,cx=200,cy=-10,x1=380,y1=85;
    const x = (1-t)*(1-t)*x0 + 2*(1-t)*t*cx + t*t*x1;
    const y = (1-t)*(1-t)*y0 + 2*(1-t)*t*cy + t*t*y1;
    return {x,y};
  }

  function applyScene(sceneIndex){
    const sc = scenes[Math.max(0,Math.min(sceneIndex, scenes.length-1))];
    body.style.setProperty('--bg1', sc.bg1);
    body.style.setProperty('--bg2', sc.bg2);
    body.style.setProperty('--fg', sc.fg);
    body.style.setProperty('--accent', sc.accent);
    body.style.setProperty('--card', sc.card);
    sceneName.textContent = sc.name ? `SCENE ${String(sceneIndex+1).padStart(2,'0')} · ${sc.name}` : '';
    const t = scenes.length<=1 ? 0 : sceneIndex/(scenes.length-1);
    const p = sunPos(t);
    arcSun.setAttribute('cx',p.x);
    arcSun.setAttribute('cy',p.y);
  }

  function render(){
    Object.values(screenEls).forEach(s=>s.classList.add('hidden'));
    screenEls[currentId].classList.remove('hidden');

    const section = byId[currentId];
    const sceneIndex = section.type==='done' ? scenes.length-1 : (section.sceneIndex ?? 0);
    applyScene(sceneIndex);

    const stepNum = history.length; // 1부터 시작
    Array.from(dotsWrap.children).forEach((d,i)=>d.classList.toggle('active', i===Math.min(stepNum-1,total-1)));

    if(section.type==='done'){
      navRow.classList.add('hidden');
      footerNote.textContent = '제출 완료';
    } else {
      navRow.classList.remove('hidden');
      prevBtn.style.visibility = history.length<=1 ? 'hidden' : 'visible';
      const targetIsDone = section.next && byId[section.next] && byId[section.next].type==='done';
      nextBtn.textContent = targetIsDone ? '제출하기' : '다음 →';
      footerNote.textContent = `${Math.min(stepNum,total)} / ${total}`;
    }
  }

  function currentScreenValid(){
    const screen = screenEls[currentId];
    const required = screen.querySelectorAll('[required]');
    for(const elReq of required){
      if(elReq.type==='radio' || elReq.type==='checkbox'){
        const name = elReq.name;
        if(!screen.querySelector(`input[name="${name}"]:checked`)){ elReq.reportValidity(); return false; }
      } else if(!elReq.checkValidity()){
        elReq.reportValidity(); return false;
      }
    }
    return true;
  }

  function resolveNextId(section){
    if(section.branch){
      const val = form.querySelector(`input[name="${section.branch.field}"]:checked`);
      if(val && section.branch.cases[val.value]) return section.branch.cases[val.value];
    }
    if(section.next) return section.next;
    // 배열상 다음 섹션으로 폴백
    const i = sections.findIndex(s=>s.id===section.id);
    return sections[i+1] ? sections[i+1].id : null;
  }

  function collectData(){
    const fd = new FormData(form);
    const data = {};
    const seen = new Set();
    for(const key of fd.keys()){
      if(seen.has(key)) continue;
      seen.add(key);
      const values = fd.getAll(key);
      data[key] = values.length>1 ? values.join(', ') : values[0];
    }
    data.timestamp = new Date().toISOString();
    return data;
  }

  function goToDone(doneId){
    const data = collectData();
    try{ localStorage.setItem('survey_backup_'+Date.now(), JSON.stringify(data)); }catch(e){}

    if(SCRIPT_URL.indexOf('PASTE_YOUR')===0){
      console.warn('SCRIPT_URL이 설정되지 않아 로컬에만 저장되었습니다.', data);
      history.push(doneId); currentId = doneId; render();
      return;
    }
    fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(data)
    }).finally(()=>{ history.push(doneId); currentId = doneId; render(); });
  }

  nextBtn.addEventListener('click', ()=>{
    if(!currentScreenValid()) return;
    const section = byId[currentId];
    const nextId = resolveNextId(section);
    if(!nextId) return;
    const nextSection = byId[nextId];
    if(nextSection.type==='done'){
      goToDone(nextId);
    } else {
      history.push(nextId); currentId = nextId; render();
    }
  });

  prevBtn.addEventListener('click', ()=>{
    if(history.length>1){ history.pop(); currentId = history[history.length-1]; render(); }
  });

  form.addEventListener('change', (e)=>{
    if(e.target.matches('.opt input')){
      const opt = e.target.closest('.opt');
      if(e.target.type==='radio'){
        opt.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('checked'));
        opt.classList.add('checked');
      } else {
        opt.classList.toggle('checked', e.target.checked);
      }
    }
  });

  render();
})();
</script>
</body>
</html>
